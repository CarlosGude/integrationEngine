<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>IntegrationEngine — visión general</title>
  <desc>Tres capas: dominio, IntegrationEngine bundle, y API externa. El ACL separa dominio de integración.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; fill: #3C3489; }
      .ts  { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .th-teal { font-size: 14px; font-weight: 600; fill: #085041; }
      .ts-teal { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .th-coral { font-size: 14px; font-weight: 600; fill: #712B13; }
      .ts-coral { font-size: 12px; font-weight: 400; fill: #993C1D; }
      .label { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .th  { fill: #CECBF6; } .ts  { fill: #AFA9EC; }
        .th-teal  { fill: #9FE1CB; } .ts-teal  { fill: #5DCAA5; }
        .th-coral { fill: #F5C4B3; } .ts-coral { fill: #F0997B; }
        .label { fill: #B4B2A9; }
      }
    </style>
  </defs>

  <!-- Domain layer -->
  <rect x="40" y="40" width="170" height="280" rx="14"
    fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="125" y="66" text-anchor="middle">Dominio</text>

  <rect x="58" y="80" width="134" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="125" y="98" text-anchor="middle" dominant-baseline="central">Controller</text>
  <text class="ts" x="125" y="114" text-anchor="middle" dominant-baseline="central">Entry point</text>

  <rect x="58" y="136" width="134" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="125" y="154" text-anchor="middle" dominant-baseline="central">App service</text>
  <text class="ts" x="125" y="170" text-anchor="middle" dominant-baseline="central">Translates DTOs</text>

  <rect x="58" y="192" width="134" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="125" y="210" text-anchor="middle" dominant-baseline="central">Domain object</text>
  <text class="ts" x="125" y="226" text-anchor="middle" dominant-baseline="central">No integration deps</text>

  <!-- IntegrationEngine layer -->
  <rect x="250" y="40" width="200" height="280" rx="14"
    fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="350" y="66" text-anchor="middle">IntegrationEngine</text>

  <rect x="268" y="80" width="164" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="350" y="98" text-anchor="middle" dominant-baseline="central">Facade</text>
  <text class="ts-teal" x="350" y="114" text-anchor="middle" dominant-baseline="central">Typed methods per action</text>

  <rect x="268" y="136" width="164" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="350" y="154" text-anchor="middle" dominant-baseline="central">Engine + registry</text>
  <text class="ts-teal" x="350" y="170" text-anchor="middle" dominant-baseline="central">Orchestrates the call</text>

  <rect x="268" y="192" width="164" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="350" y="210" text-anchor="middle" dominant-baseline="central">Action / Mapper</text>
  <text class="ts-teal" x="350" y="226" text-anchor="middle" dominant-baseline="central">Request + response DTOs</text>

  <!-- External API -->
  <rect x="500" y="100" width="140" height="160" rx="14"
    fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="570" y="140" text-anchor="middle">External API</text>
  <text class="ts-coral" x="570" y="160" text-anchor="middle">REST · GraphQL</text>
  <text class="ts-coral" x="570" y="178" text-anchor="middle">SOAP · custom</text>
  <text class="ts-coral" x="570" y="196" text-anchor="middle">Raw JSON →</text>

  <!-- ACL dashed line -->
  <line x1="210" y1="50" x2="210" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="label" x="212" y="326" text-anchor="middle">ACL</text>

  <!-- Arrows -->
  <line x1="192" y1="180" x2="248" y2="180" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="168" x2="498" y2="168" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="498" y1="188" x2="450" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
