<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>IntegrationEngine — arquitectura interna</title>
  <desc>Flujo de engine.send() con puertos y sus adaptadores intercambiables a la derecha.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th-p  { font-size:14px; font-weight:600; fill:#3C3489; }
      .ts-p  { font-size:12px; font-weight:400; fill:#534AB7; }
      .th-t  { font-size:14px; font-weight:600; fill:#085041; }
      .ts-t  { font-size:12px; font-weight:400; fill:#0F6E56; }
      .th-g  { font-size:14px; font-weight:600; fill:#444441; }
      .ts-g  { font-size:12px; font-weight:400; fill:#5F5E5A; }
      .th-a  { font-size:14px; font-weight:600; fill:#633806; }
      .ts-a  { font-size:12px; font-weight:400; fill:#854F0B; }
      .th-c  { font-size:14px; font-weight:600; fill:#712B13; }
      .ts-c  { font-size:12px; font-weight:400; fill:#993C1D; }
      .caption { font-size:11px; font-weight:400; fill:#888780; }
      @media (prefers-color-scheme: dark) {
        .th-p{fill:#CECBF6;} .ts-p{fill:#AFA9EC;}
        .th-t{fill:#9FE1CB;} .ts-t{fill:#5DCAA5;}
        .th-g{fill:#D3D1C7;} .ts-g{fill:#B4B2A9;}
        .th-a{fill:#FAC775;} .ts-a{fill:#EF9F27;}
        .th-c{fill:#F5C4B3;} .ts-c{fill:#F0997B;}
        .caption{fill:#888780;}
      }
    </style>
  </defs>

  <!-- ── Left column: engine flow ── -->

  <!-- 1. Entry -->
  <rect x="40" y="30" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-p" x="120" y="48" text-anchor="middle" dominant-baseline="central">registry.get(NAME)</text>
  <text class="ts-p" x="120" y="64" text-anchor="middle" dominant-baseline="central">Entry point</text>
  <line x1="120" y1="74" x2="120" y2="104" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2. send() -->
  <rect x="40" y="104" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-t" x="120" y="124" text-anchor="middle" dominant-baseline="central">engine.send()</text>
  <text class="ts-t" x="120" y="144" text-anchor="middle" dominant-baseline="central">action · context · body · headers</text>
  <line x1="120" y1="160" x2="120" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3. ConfigPort -->
  <rect x="40" y="190" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-g" x="120" y="208" text-anchor="middle" dominant-baseline="central">ConfigPort</text>
  <text class="ts-g" x="120" y="224" text-anchor="middle" dominant-baseline="central">Loads action from YAML</text>
  <line x1="120" y1="234" x2="120" y2="264" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4. Authorization -->
  <rect x="40" y="264" width="160" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-a" x="120" y="282" text-anchor="middle" dominant-baseline="central">Authorization</text>
  <text class="ts-a" x="120" y="298" text-anchor="middle" dominant-baseline="central">Static / dynamic + cache</text>
  <line x1="120" y1="308" x2="120" y2="338" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5. ClientInterface -->
  <rect x="40" y="338" width="160" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-c" x="120" y="356" text-anchor="middle" dominant-baseline="central">ClientInterface</text>
  <text class="ts-c" x="120" y="372" text-anchor="middle" dominant-baseline="central">REST · GraphQL · custom</text>
  <line x1="120" y1="382" x2="120" y2="412" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 6. Mapper → Response -->
  <rect x="40" y="412" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-t" x="120" y="430" text-anchor="middle" dominant-baseline="central">Mapper</text>
  <text class="ts-t" x="120" y="446" text-anchor="middle" dominant-baseline="central">array → ResponseInterface</text>

  <!-- ── Right column: adapters ── -->
  <text class="caption" x="420" y="22" text-anchor="middle">adaptadores (intercambiables)</text>

  <!-- ConfigPort adapters -->
  <line x1="200" y1="212" x2="278" y2="212" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="278" y="190" width="148" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-g" x="352" y="208" text-anchor="middle" dominant-baseline="central">YamlConfigAdapter</text>
  <text class="ts-g" x="352" y="224" text-anchor="middle" dominant-baseline="central">Default · file-based</text>
  <rect x="444" y="190" width="136" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-g" x="512" y="208" text-anchor="middle" dominant-baseline="central">Custom ConfigPort</text>
  <text class="ts-g" x="512" y="224" text-anchor="middle" dominant-baseline="central">DB, remote, etc.</text>
  <line x1="426" y1="212" x2="442" y2="212" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Auth adapters -->
  <line x1="200" y1="286" x2="278" y2="286" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="278" y="264" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-a" x="328" y="282" text-anchor="middle" dominant-baseline="central">StaticAuth</text>
  <text class="ts-a" x="328" y="298" text-anchor="middle" dominant-baseline="central">bearer · basic · key</text>
  <rect x="390" y="264" width="110" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-a" x="445" y="282" text-anchor="middle" dominant-baseline="central">DynamicAuth</text>
  <text class="ts-a" x="445" y="298" text-anchor="middle" dominant-baseline="central">token + CachePort</text>
  <rect x="512" y="264" width="108" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-a" x="566" y="282" text-anchor="middle" dominant-baseline="central">CachePort</text>
  <text class="ts-a" x="566" y="298" text-anchor="middle" dominant-baseline="central">PSR-6 / custom</text>
  <line x1="378" y1="286" x2="388" y2="286" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="500" y1="286" x2="510" y2="286" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Client adapters -->
  <line x1="200" y1="360" x2="278" y2="360" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="278" y="338" width="112" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-c" x="334" y="356" text-anchor="middle" dominant-baseline="central">SymfonyHTTP</text>
  <text class="ts-c" x="334" y="372" text-anchor="middle" dominant-baseline="central">REST adapter</text>
  <rect x="402" y="338" width="100" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-c" x="452" y="356" text-anchor="middle" dominant-baseline="central">GraphQL</text>
  <text class="ts-c" x="452" y="372" text-anchor="middle" dominant-baseline="central">GraphQL adapter</text>
  <rect x="514" y="338" width="100" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-c" x="564" y="356" text-anchor="middle" dominant-baseline="central">Custom</text>
  <text class="ts-c" x="564" y="372" text-anchor="middle" dominant-baseline="central">SOAP · etc.</text>
  <line x1="390" y1="360" x2="400" y2="360" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="502" y1="360" x2="512" y2="360" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Headers note -->
  <text class="caption" x="420" y="480" text-anchor="middle">Headers: YAML defaults → auth → caller (cada capa sobreescribe la anterior)</text>
</svg>
