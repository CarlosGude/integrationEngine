services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $projectDir: '%kernel.project_dir%'

    IntegrationEngine\:
        resource: '../../../'
        exclude:
            - '../../../Infrastructure/Adapter/YamlConfigAdapter.php'
            - '../../../Infrastructure/Http/SymfonyHttpClientAdapter.php'
            - '../../../Infrastructure/Http/GraphQLClientAdapter.php'
            - '../../../Core/IntegrationEngine.php'
            # Implements symfony/http-kernel's DataCollectorInterface, which is
            # not a required dependency of this bundle. Autodiscovery requires
            # every matched file to register its declared classes — that would
            # fatal in a project without symfony/http-kernel. Registered
            # manually and conditionally by IntegrationCompilerPass instead.
            - '../../../Infrastructure/Debug/IntegrationEngineDataCollector.php'
            # Registered manually per-integration by IntegrationCompilerPass.
            - '../../../Infrastructure/Client/MiddlewareClient.php'
            - '../../../Infrastructure/Cache/CachingMiddleware.php'
            - '../../../Infrastructure/Debug/TracingMiddleware.php'

    # Built-in adapters — explicitly registered.
    # To add a custom adapter, tag your service with integration_engine.client_adapter
    # in your project's services.yaml:
    #
    #   App\Infrastructure\Http\SoapClientAdapter:
    #       tags:
    #           - { name: integration_engine.client_adapter }
    IntegrationEngine\Infrastructure\Http\SymfonyHttpClientAdapter:
        tags:
            - { name: integration_engine.client_adapter }

    IntegrationEngine\Infrastructure\Http\GraphQLClientAdapter:
        tags:
            - { name: integration_engine.client_adapter }

    # Default cache adapter — wraps Symfony's cache.app (PSR-6) into CachePort.
    # Override per-integration with cache_service: my_cache_service in integration_engine.yaml.
    integration_engine.cache.default:
        class: IntegrationEngine\Infrastructure\Cache\Psr6CacheAdapter
        arguments:
            - '@cache.app'

    IntegrationEngine\Infrastructure\Http\ClientAdapterResolver:
        public: true